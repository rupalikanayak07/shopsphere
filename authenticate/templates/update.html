{% extends 'main.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'user.css' %}">
{% endblock %}

{% block content %}

<div class="update-container">

    <div class="update-card">
        <h2>Update Profile</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{data.first_name}}">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{data.last_name}}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{data.email}}">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{data.username}}" readonly class="readonly">
            </div>

            <button type="submit" class="submit-btn">Save Changes</button>

        </form>

        <div class="extra-links">
            <a href="{% url 'reset_pass' %}">Reset Password</a>
        </div>
    </div>

</div>

{% endblock %}
